<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление событиями своей жизни</title>
<style>
  :root {
    --sidebar-bg: #1a2332;
    --sidebar-hover: #243045;
    --sidebar-active: #2d6a4f;
    --accent: #40916c;
    --accent-light: #52b788;
    --text-primary: #1b2332;
    --text-secondary: #546e7a;
    --bg-page: #f4f6f9;
    --bg-card: #ffffff;
    --border: #e0e6ed;
    --task-bg: #fff8e1;
    --task-border: #f9a825;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- TOP HEADER ---- */
  .top-header {
    background: var(--sidebar-bg);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .top-header .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: -.5px; }
  .top-header .subtitle { font-size: .85rem; color: #94a3b8; margin-left: auto; white-space: nowrap; }
  .menu-btn {
    display: none;
    background: none; border: none; color: #fff;
    font-size: 1.4rem; cursor: pointer; padding: 4px;
  }

  /* ---- LAYOUT ---- */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 52px);
  }

  /* ---- SIDEBAR ---- */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--sidebar-bg);
    color: #cbd5e1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 32px;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  .block-section { border-bottom: 1px solid #243045; }
  .block-title {
    padding: 14px 18px 12px;
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #64748b;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
    transition: color .2s;
  }
  .block-title:hover { color: #94a3b8; }
  .block-title .chevron {
    margin-left: auto;
    font-size: .75rem;
    transition: transform .25s;
  }
  .block-section.open .chevron { transform: rotate(90deg); }
  .block-title .block-icon { font-size: 1rem; }

  .lessons-list { display: none; }
  .block-section.open .lessons-list { display: block; }

  .lesson-item {
    padding: 10px 18px 10px 36px;
    font-size: .875rem;
    cursor: pointer;
    transition: background .15s, color .15s;
    color: #94a3b8;
    display: flex;
    align-items: center;
    gap: 10px;
    line-height: 1.35;
    border-left: 3px solid transparent;
  }
  .lesson-item:hover { background: var(--sidebar-hover); color: #e2e8f0; }
  .lesson-item.active {
    background: rgba(64,145,108,.15);
    color: #6ee7b7;
    border-left-color: var(--accent-light);
    font-weight: 600;
  }
  .lesson-item .num {
    font-size: .75rem;
    color: #475569;
    min-width: 18px;
    text-align: right;
    flex-shrink: 0;
  }
  .lesson-item.active .num { color: #4ade80; }

  /* ---- MAIN CONTENT ---- */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    min-width: 0;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: #c9d4df; border-radius: 4px; }

  .welcome-screen {
    max-width: 700px;
    margin: 40px auto;
    text-align: center;
  }
  .welcome-screen h1 { font-size: 2rem; color: var(--text-primary); margin-bottom: 12px; }
  .welcome-screen p { color: var(--text-secondary); font-size: 1.05rem; margin-bottom: 24px; line-height: 1.6; }
  .welcome-screen .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 24px 0;
  }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-item .label { font-size: .8rem; color: var(--text-secondary); }

  /* Config panel */
  .config-panel {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 10px;
    padding: 16px 20px;
    margin: 24px auto;
    max-width: 700px;
    font-size: .875rem;
  }
  .config-panel h3 { color: #0369a1; margin-bottom: 8px; font-size: .95rem; }
  .config-panel p { color: #0369a1; margin-bottom: 10px; line-height: 1.5; }
  .config-row { display: flex; gap: 8px; align-items: center; }
  .config-row input {
    flex: 1; padding: 8px 12px; border: 1px solid #bae6fd; border-radius: 6px;
    font-size: .875rem; background: #fff; color: var(--text-primary);
  }
  .config-row button {
    padding: 8px 16px; background: #0284c7; color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-size: .875rem; white-space: nowrap;
  }
  .config-row button:hover { background: #0369a1; }
  .config-status { margin-top: 8px; font-size: .8rem; color: #0369a1; }

  /* Lesson page */
  .lesson-header { margin-bottom: 24px; }
  .lesson-breadcrumb { font-size: .8rem; color: var(--text-secondary); margin-bottom: 6px; }
  .lesson-breadcrumb span { color: var(--accent); }
  .lesson-title { font-size: 1.7rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .lesson-meta { font-size: .85rem; color: var(--text-secondary); }

  /* Video section */
  .section-card {
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    border: 1px solid var(--border);
  }
  .section-card-header {
    padding: 14px 20px;
    font-weight: 700;
    font-size: .9rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fafbfc;
    color: var(--text-primary);
  }
  .section-card-body { padding: 20px; }

  /* Video player */
  .video-wrapper {
    position: relative;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .video-wrapper video {
    width: 100%;
    display: block;
    max-height: 480px;
  }
  .video-label {
    font-size: .8rem;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 6px;
    margin-bottom: 16px;
  }

  /* Files */
  .files-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: .875rem;
    font-weight: 500;
    text-decoration: none;
    transition: all .15s;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .file-chip.pdf {
    background: #fef3c7;
    color: #92400e;
    border-color: #fde68a;
  }
  .file-chip.pdf:hover { background: #fde68a; }
  .file-chip.docx {
    background: #dbeafe;
    color: #1e3a8a;
    border-color: #bfdbfe;
  }
  .file-chip.docx:hover { background: #bfdbfe; }
  .file-chip.mp3 {
    background: #f0fdf4;
    color: #14532d;
    border-color: #bbf7d0;
  }
  .file-chip.mp3:hover { background: #bbf7d0; }
  .file-icon { font-size: 1rem; }

  /* Task/Homework */
  .task-card {
    background: var(--task-bg);
    border: 1px solid var(--task-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .task-card .task-header {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1rem;
    color: #7c4900;
    margin-bottom: 12px;
  }
  .task-card .task-text {
    font-size: .95rem;
    line-height: 1.7;
    color: #4a3000;
  }

  /* Audio player */
  .audio-player { width: 100%; margin: 8px 0; accent-color: var(--accent); }

  /* Stop lesson badge */
  .stop-badge {
    display: inline-block;
    background: #fee2e2;
    color: #991b1b;
    font-size: .7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid #fca5a5;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .menu-btn { display: block; }
    .sidebar {
      position: fixed;
      left: -300px;
      top: 52px;
      height: calc(100vh - 52px);
      z-index: 99;
      transition: left .25s;
    }
    .sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,.3); }
    .main { padding: 20px 18px; }
    .layout { height: calc(100vh - 52px); }
    .top-header .subtitle { display: none; }
  }
</style>
</head>

  }

function fileIcon(type) {
  return type === 'pdf' ? '📄' : type === 'docx' ? '📝' : '🎵';
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  COURSE.blocks.forEach((block, bi) => {
    html += `<div class="block-section" id="bs-${block.id}">
      <div class="block-title" onclick="toggleBlock('${block.id}')">
        <span class="block-icon">${block.icon}</span>
        <span>${block.title}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="lessons-list">`;
    block.lessons.forEach(lesson => {
      const lid = `${block.id}-${lesson.num}`;
      html += `<div class="lesson-item" id="li-${lid}" onclick="showLesson('${block.id}', ${lesson.num})">
        <span class="num">${lesson.num}</span>
        <span>${lesson.title}${lesson.stop ? ' <span class="stop-badge">стоп</span>' : ''}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  sidebar.innerHTML = html;
}

function toggleBlock(blockId) {
  const section = document.getElementById('bs-' + blockId);
  section.classList.toggle('open');
}

  document.getElementById('main').innerHTML = `
    <div class="welcome-screen">
      <h1>🌿 ${COURSE.title}</h1>
      <p>Группа «Белка» · Базовый пакет · Офлайн-версия</p>
      <div class="stats">
        <div class="stat-item"><div class="num">${COURSE.blocks.length}</div><div class="label">блоков</div></div>
        <div class="stat-item"><div class="num">${totalLessons}</div><div class="label">уроков</div></div>
        <div class="stat-item"><div class="num">${totalFiles}</div><div class="label">материалов</div></div>
      </div>
      <p>Выберите урок в меню слева для просмотра. ${IS_LOCAL ? 'Файлы читаются локально.' : 'Файлы загружаются с Яндекс.Диска.'}</p>

      ${COURSE.intro_video ? `
      <div class="section-card" style="margin-top:24px;text-align:left">
        <div class="section-card-header">🎬 Вводное видео</div>
        <div class="section-card-body">
          <div class="video-wrapper">
            <video controls preload="metadata" src="${buildSrc('', COURSE.intro_video)}"></video>
          </div>
        </div>
      </div>` : ''}
    </div>`;
}

function showLesson(blockId, lessonNum) {
  const block = COURSE.blocks.find(b => b.id === blockId);
  const lesson = block.lessons.find(l => l.num === lessonNum);

  // Highlight active
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`li-${blockId}-${lessonNum}`).classList.add('active');

  // Close sidebar on mobile
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.remove('open');
  }

  let html = `
    <div class="lesson-header">
      <div class="lesson-breadcrumb">${block.title} <span>›</span></div>
      <div class="lesson-title">Урок ${lesson.num} — ${lesson.title}${lesson.stop ? ' <span class="stop-badge">стоп-урок</span>' : ''}</div>
    </div>`;

  // Videos
  if (lesson.videos && lesson.videos.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">🎬 Видеоурок</div>
      <div class="section-card-body">`;
    lesson.videos.forEach((v, i) => {
      html += `<div class="video-wrapper">
          <video controls preload="metadata" src="${buildSrc(lesson.folder, v)}"></video>
        </div>`;
      if (lesson.videos.length > 1) {
        html += `<div class="video-label">Часть ${i + 1}</div>`;
      }
    });
    html += `</div></div>`;
  }

  // Task / Homework
  if (lesson.task) {
    html += `<div class="task-card">
      <div class="task-header">📋 Задание</div>
      <div class="task-text">${lesson.task.replace(/\n\n/g, '</p><p style="margin-top:10px">').replace(/\n/g, '<br>')}</div>
    </div>`;
  }

  // Files
  const filesWithoutMp3 = lesson.files.filter(f => f.type !== 'mp3');
  const mp3Files = lesson.files.filter(f => f.type === 'mp3');

  if (filesWithoutMp3.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">📁 Материалы к уроку</div>
      <div class="section-card-body">
        <div class="files-grid">`;
    filesWithoutMp3.forEach(f => {
      html += `<a class="file-chip ${f.type}" href="${buildSrc(lesson.folder, f.file, f.url)}" target="_blank">
          <span class="file-icon">${fileIcon(f.type)}</span>
          <span>${f.name}</span>
        </a>`;
    });
    html += `</div></div></div>`;
  }

  // Audio (MP3)
  if (mp3Files.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">🎵 Медитации и аудио</div>
      <div class="section-card-body">`;
    mp3Files.forEach(f => {
      html += `<div style="margin-bottom:12px">
          <div style="font-size:.875rem;font-weight:600;margin-bottom:6px;color:#14532d">🎵 ${f.name}</div>
          <audio controls class="audio-player" src="${buildSrc(lesson.folder, f.file, f.url)}"></audio>
        </div>`;
    });
    html += `</div></div>`;
  }

  // Navigation buttons
  const allLessons = [];
  COURSE.blocks.forEach(b => b.lessons.forEach(l => allLessons.push({blockId: b.id, num: l.num})));
  const currentIdx = allLessons.findIndex(x => x.blockId === blockId && x.num === lessonNum);

  html += `<div style="display:flex;gap:12px;margin-top:8px;padding-bottom:32px">`;
  if (currentIdx > 0) {
    const prev = allLessons[currentIdx - 1];
    html += `<button onclick="showLesson('${prev.blockId}', ${prev.num})" style="padding:10px 18px;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:.875rem;color:#374151">← Предыдущий урок</button>`;
  }
  if (currentIdx < allLessons.length - 1) {
    const next = allLessons[currentIdx + 1];
    html += `<button onclick="showLesson('${next.blockId}', ${next.num})" style="margin-left:auto;padding:10px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.875rem;font-weight:600">Следующий урок →</button>`;
  }
  html += `</div>`;

  const main = document.getElementById('main');
  main.innerHTML = html;
  main.scrollTop = 0;
}


function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
(function init() {
  buildSidebar();
  showWelcome();

  // Open first block by default
  document.getElementById('bs-intro') && toggleBlock('intro');
  document.getElementById('bs-block1') && toggleBlock('block1');
})();
</script>
</body>
