// file:// = локальный режим; http/https = удалённый (Яндекс.Диск)

// Локальный путь (file:// режим)
function localSrc(folder, file) {
  const raw = folder ? folder + '/' + file : file;
  return raw.split('/').map(encodeURIComponent).join('/');
}

// Получить прямую CDN-ссылку через публичный API Яндекс.Диска
async function ydUrl(relPath) {
  const api = 'https://cloud-api.yandex.net/v1/disk/public/resources/download'
    + '?public_key=' + encodeURIComponent(YD_PUBLIC_KEY)
    + '&path=' + encodeURIComponent('/' + relPath);
  const r = await fetch(api);
  if (!r.ok) throw new Error('YD API ' + r.status);
  return (await r.json()).href;
}

// После установки innerHTML — async-заполнение src/href для [data-yd] элементов
function hydrateRemote(container) {
  container.querySelectorAll('[data-yd]').forEach(async el => {
    try {
      const url = await ydUrl(el.dataset.yd);
      if (el.matches('video,audio')) el.src = url;
      else el.href = url;
    } catch(e) { console.warn('YD failed:', el.dataset.yd, e); }
  });
}

function fileIcon(type) {
  return type === 'pdf' ? '📄' : type === 'docx' ? '📝' : '🎵';
}

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  COURSE.blocks.forEach((block, bi) => {
    html += `<div class="block-section" id="bs-${block.id}">
      <div class="block-title" onclick="toggleBlock('${block.id}')">
        <span class="block-icon">${block.icon}</span>
        <span>${block.title}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="lessons-list">`;
    block.lessons.forEach(lesson => {
      const lid = `${block.id}-${lesson.num}`;
      html += `<div class="lesson-item" id="li-${lid}" onclick="showLesson('${block.id}', ${lesson.num})">
        <span class="num">${lesson.num}</span>
        <span>${lesson.title}${lesson.stop ? ' <span class="stop-badge">стоп</span>' : ''}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  sidebar.innerHTML = html;
}

function toggleBlock(blockId) {
  const section = document.getElementById('bs-' + blockId);
  section.classList.toggle('open');
}

function showWelcome() {
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  const totalLessons = COURSE.blocks.reduce((s, b) => s + b.lessons.length, 0);
  const totalFiles = COURSE.blocks.reduce((s, b) => s + b.lessons.reduce((s2, l) => s2 + l.files.length, 0), 0);

  document.getElementById('main').innerHTML = `
    <div class="welcome-screen">
      <h1>🌿 ${COURSE.title}</h1>
      <p>Группа «Белка» · Базовый пакет · Офлайн-версия</p>
      <div class="stats">
        <div class="stat-item"><div class="num">${COURSE.blocks.length}</div><div class="label">блоков</div></div>
        <div class="stat-item"><div class="num">${totalLessons}</div><div class="label">уроков</div></div>
        <div class="stat-item"><div class="num">${totalFiles}</div><div class="label">материалов</div></div>
      </div>
      <p>Выберите урок в меню слева для просмотра. ${IS_LOCAL ? 'Файлы читаются локально.' : 'Файлы загружаются с Яндекс.Диска.'}</p>

      ${COURSE.intro_video ? `
      <div class="section-card" style="margin-top:24px;text-align:left">
        <div class="section-card-header">🎬 Вводное видео</div>
        <div class="section-card-body">
          <div class="video-wrapper">
            <video controls preload="metadata" ${IS_LOCAL ? `src="${localSrc('', COURSE.intro_video)}"` : `data-yd="${COURSE.intro_video}"`}></video>
          </div>
        </div>
      </div>` : ''}
    </div>`;
  if (!IS_LOCAL) hydrateRemote(document.getElementById('main'));
}

function showLesson(blockId, lessonNum) {
  const block = COURSE.blocks.find(b => b.id === blockId);
  const lesson = block.lessons.find(l => l.num === lessonNum);

  // Highlight active
  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`li-${blockId}-${lessonNum}`).classList.add('active');

  // Close sidebar on mobile
  if (window.innerWidth < 768) {
    document.getElementById('sidebar').classList.remove('open');
  }

  let html = `
    <div class="lesson-header">
      <div class="lesson-breadcrumb">${block.title} <span>›</span></div>
      <div class="lesson-title">Урок ${lesson.num} — ${lesson.title}${lesson.stop ? ' <span class="stop-badge">стоп-урок</span>' : ''}</div>
    </div>`;

  // Videos
  if (lesson.videos && lesson.videos.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">🎬 Видеоурок</div>
      <div class="section-card-body">`;
    lesson.videos.forEach((v, i) => {
      const rel = lesson.folder ? lesson.folder + '/' + v : v;
      const srcAttr = IS_LOCAL
        ? `src="${localSrc(lesson.folder, v)}"`
        : `data-yd="${rel}"`;
      html += `<div class="video-wrapper">
          <video controls preload="metadata" ${srcAttr}></video>
        </div>`;
      if (lesson.videos.length > 1) {
        html += `<div class="video-label">Часть ${i + 1}</div>`;
      }
    });
    html += `</div></div>`;
  }

  // Task / Homework
  if (lesson.task) {
    html += `<div class="task-card">
      <div class="task-header">📋 Задание</div>
      <div class="task-text">${lesson.task.replace(/\n\n/g, '</p><p style="margin-top:10px">').replace(/\n/g, '<br>')}</div>
    </div>`;
  }

  // Files
  const filesWithoutMp3 = lesson.files.filter(f => f.type !== 'mp3');
  const mp3Files = lesson.files.filter(f => f.type === 'mp3');

  if (filesWithoutMp3.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">📁 Материалы к уроку</div>
      <div class="section-card-body">
        <div class="files-grid">`;
    filesWithoutMp3.forEach(f => {
      const rel = lesson.folder ? lesson.folder + '/' + f.file : f.file;
      const hrefAttr = IS_LOCAL
        ? `href="${localSrc(lesson.folder, f.file)}"`
        : `data-yd="${rel}"`;
      html += `<a class="file-chip ${f.type}" ${hrefAttr} target="_blank" download>
          <span class="file-icon">${fileIcon(f.type)}</span>
          <span>${f.name}</span>
        </a>`;
    });
    html += `</div></div></div>`;
  }

  // Audio (MP3)
  if (mp3Files.length > 0) {
    html += `<div class="section-card">
      <div class="section-card-header">🎵 Медитации и аудио</div>
      <div class="section-card-body">`;
    mp3Files.forEach(f => {
      const rel = lesson.folder ? lesson.folder + '/' + f.file : f.file;
      const srcAttr = IS_LOCAL
        ? `src="${localSrc(lesson.folder, f.file)}"`
        : `data-yd="${rel}"`;
      html += `<div style="margin-bottom:12px">
          <div style="font-size:.875rem;font-weight:600;margin-bottom:6px;color:#14532d">🎵 ${f.name}</div>
          <audio controls class="audio-player" ${srcAttr}></audio>
        </div>`;
    });
    html += `</div></div>`;
  }

  // Navigation buttons
  const allLessons = [];
  COURSE.blocks.forEach(b => b.lessons.forEach(l => allLessons.push({blockId: b.id, num: l.num})));
  const currentIdx = allLessons.findIndex(x => x.blockId === blockId && x.num === lessonNum);

  html += `<div style="display:flex;gap:12px;margin-top:8px;padding-bottom:32px">`;
  if (currentIdx > 0) {
    const prev = allLessons[currentIdx - 1];
    html += `<button onclick="showLesson('${prev.blockId}', ${prev.num})" style="padding:10px 18px;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:.875rem;color:#374151">← Предыдущий урок</button>`;
  }
  if (currentIdx < allLessons.length - 1) {
    const next = allLessons[currentIdx + 1];
    html += `<button onclick="showLesson('${next.blockId}', ${next.num})" style="margin-left:auto;padding:10px 18px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.875rem;font-weight:600">Следующий урок →</button>`;
  }
  html += `</div>`;

  const main = document.getElementById('main');
  main.innerHTML = html;
  main.scrollTop = 0;
  if (!IS_LOCAL) hydrateRemote(main);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
// INIT
// ============================================================
(function init() {
  buildSidebar();
  showWelcome();

  // Open first block by default
  document.getElementById('bs-intro') && toggleBlock('intro');
  document.getElementById('bs-block1') && toggleBlock('block1');
})();
</script>
</body>
</html>
